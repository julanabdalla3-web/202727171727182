<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title><3</title>
  <link rel="icon" type="image/png" href="icon.png">
  <style>
body{
margin:0;
font-family:Arial,sans-serif;
background:radial-gradient(circle at top,#050814,#02030a);
color:#d7e6ff;
overflow-x:hidden;
}

#lock{
position:fixed;inset:0;background:#02030a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999
}
#lock input{padding:10px;border-radius:10px;border:none;margin-top:10px}

#stars{position:fixed;inset:0;z-index:0}
.star{position:absolute;width:2px;height:2px;background:white;opacity:.6;animation:float 12s linear infinite}
@keyframes float{from{transform:translateY(-10vh)}to{transform:translateY(110vh)}}

header{text-align:center;padding:15px;color:#7cc4ff;position:relative;z-index:2}

nav{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;position:relative;z-index:2}

button{background:rgba(120,180,255,.15);border:1px solid #3a6ea5;color:#d7e6ff;padding:8px 10px;border-radius:10px;cursor:pointer}
button:hover{background:rgba(120,180,255,.3)}

section{display:none;max-width:950px;margin:auto;padding:15px;z-index:2;position:relative}
section.active{display:block}

textarea,input{width:100%;padding:10px;border-radius:10px;border:none;margin-top:8px;background:rgba(255,255,255,.06);color:white}

.card{background:rgba(255,255,255,.06);padding:10px;margin-top:10px;border-radius:10px}

.flyBig{
position:absolute;
left:50%;top:40%;
transform:translate(-50%,-50%);
animation:blast 1.8s forwards;
font-size:18px;
text-align:center;
}
@keyframes blast{
0%{transform:translate(-50%,-50%) scale(1);opacity:1}
100%{transform:translate(-50%,-500px) scale(0.3);opacity:0}
}

/* MODAL WINDOW SYSTEM */
.modalBg{
position:fixed;inset:0;background:rgba(0,0,0,.7);
display:none;
justify-content:center;
align-items:center;
z-index:9999
}
.modalBox{
background:#0b1020;
padding:45px 15px 15px 15px;
border-radius:12px;
max-width:600px;
max-height:70vh;
overflow:auto;
position:relative
}
.modalClose{
position:absolute;
top:10px;
right:10px;
background:red;
color:white;
border:none;
border-radius:6px;
padding:6px 10px;
cursor:pointer;
z-index:10000
}

.essay{white-space:pre-wrap;line-height:1.6}
</style>
</head>
<body>

<div id="lock">
<h2>🔒 Safe Space Login</h2>
<input id="pw" type="password" placeholder="cozy1027B" />
<button onclick="unlock()">Enter</button>
</div>

<div id="stars"></div>
<header>🌌 Safe Space Station</header>

<nav>
<button onclick="show('deck')">Deck</button>
<button onclick="show('vent')">Vent</button>
<button onclick="show('notebook')">Notebook</button>
<button onclick="show('library')">Library</button>

<button onclick="show('orbit')">Orbit</button>
</nav>

<section id="deck" class="active">
<h2>🛰️ Command Deck</h2>
<img id="img" style="width:100%;border-radius:12px;margin-top:10px" />
<button onclick="nextImg()">Next Space View</button>
<p id="deckText"></p>
</section>

<section id="vent">
<h2>💬 Vent Into Space</h2>
<textarea id="ventText"></textarea>
<button onclick="ventSend()">Launch</button>
<div id="ventOut"></div>
</section>

<section id="notebook">
<h2>📓 Notebook</h2>
<div class="card">
<p id="pageInfo"></p>
<textarea id="noteText" style="height:60vh"></textarea>
<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px">
<button onclick="backPage()">⬅ Back</button>
<button onclick="savePage()">💾 Save</button>
<button onclick="nextPage()">Next ➡</button>
</div>
</div>
</section>

<section id="library">
<h2>📚 Library</h2>
<input id="t" placeholder="title" />
<textarea id="c"></textarea>
<button onclick="addBook()">Add</button>
<div id="books"></div>
</section>



<section id="orbit">
<h2>🧘 Orbit Room</h2>

<h3>Mood Energy Control</h3>
<input id="energy" type="range" min="0" max="100" value="50" oninput="setEnergy(this.value)" />
<div id="moodText" class="card"></div>

<h3>Music</h3>
<select id="musicSelect"></select>
<button onclick="nextSong()">Next Song</button>
<div id="player" style="margin-top:10px"></div>

<h3>Comfort Messages</h3>
<input id="msgTitle" placeholder="title" />
<textarea id="msgBody" placeholder="message"></textarea>
<button onclick="addMsg()">Save Message</button>
<div id="msgs"></div>

</section>

<!-- MODAL -->
<div id="modal" class="modalBg">
<div class="modalBox">
<button class="modalClose" onclick="closeModal()">X</button>
<div id="modalContent"></div>
</div>
</div>

<script>

function unlock(){
if(document.getElementById('pw').value==='cozy1027B')
document.getElementById('lock').style.display='none';
}

function show(id){
document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* STAR ENERGY */
const stars=[];
const container=document.getElementById("stars");
for(let i=0;i<120;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";
stars.push(s);
container.appendChild(s);
}

function setEnergy(v){
let speed=12-(v/10);
stars.forEach(s=>s.style.animationDuration=speed+"s");

if(v<30)document.body.style.filter="brightness(0.9)";
else if(v<70)document.body.style.filter="none";
else document.body.style.filter="contrast(1.1) brightness(1.05)";

let msg=v<30?"Low orbit calm":v<70?"Stable orbit":"High activity orbit";
document.getElementById("moodText").innerText=msg;
}
setEnergy(50);

/* DECK */
const imgs=[
"https://images.unsplash.com/photo-1446776811953-b23d57bd21aa",
"https://images.unsplash.com/photo-1462331940025-496dfbfc7564",
"https://images.unsplash.com/photo-1451187580459-43490279c0fa",
"https://images.unsplash.com/photo-1454789548928-9efd52dc4031",
"https://images.unsplash.com/photo-1444703686981-a3abbc4d4fe3",
"https://images.unsplash.com/photo-1465101162946-4377e57745c3",
"https://images.unsplash.com/photo-1451188502541-13943edb6acb",
"https://images.unsplash.com/photo-1473929732538-f7691dcf89a8",
"https://images.unsplash.com/photo-1447433589675-4aaa569f3e05",
"https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?2"
];
let i=0;
function nextImg(){document.getElementById('img').src=imgs[i];i=(i+1)%imgs.length}
nextImg();

/* VENT */
function ventSend(){
let t=document.getElementById('ventText');
if(!t.value)return;
let fly=document.createElement('div');fly.className='flyBig';fly.innerText="LAUNCHING...";
document.body.appendChild(fly);
setTimeout(()=>{fly.remove();let out=document.createElement('div');out.className='card';out.innerText="Its okay, I promise. You are gonna be okay, it has been sent off somewhere, never to be seen again.";document.getElementById('ventOut').prepend(out);},1500);
t.value='';
}

/* NOTEBOOK */
let pages=JSON.parse(localStorage.getItem('p')||'[]');
let currentPage=0;

function ensurePages(){
if(pages.length===0){pages.push("");}
}

function renderPage(){
ensurePages();
if(currentPage>=pages.length) currentPage=pages.length-1;
if(currentPage<0) currentPage=0;

document.getElementById('noteText').value=pages[currentPage]||"";
document.getElementById('pageInfo').innerText="Page " + (currentPage+1) + " / " + pages.length;
}

function savePage(){
ensurePages();
pages[currentPage]=document.getElementById('noteText').value;
localStorage.setItem('p',JSON.stringify(pages));
renderPage();
}

function nextPage(){
savePage();
currentPage++;
if(currentPage>=pages.length){pages.push("");}
localStorage.setItem('p',JSON.stringify(pages));
renderPage();
}

function backPage(){
savePage();
currentPage--;
renderPage();
}

renderPage();

/* LIBRARY */
function addBook(){let t=document.getElementById('t').value,c=document.getElementById('c').value;let b=JSON.parse(localStorage.getItem('b')||'[]');b.push({t,c});localStorage.setItem('b',JSON.stringify(b));load();}
function load(){let b=JSON.parse(localStorage.getItem('b')||'[]');let o=document.getElementById('books');o.innerHTML='';b.forEach((x,i)=>{let d=document.createElement('div');d.className='card';d.innerHTML=`<b>${x.t}</b><br><button onclick=\"openBook(${i})\">open</button><button onclick=\"delBook(${i})\">X</button>`;o.appendChild(d);});}
function openBook(i){let b=JSON.parse(localStorage.getItem('b'));openModal(b[i].c);}
function delBook(i){let b=JSON.parse(localStorage.getItem('b'));b.splice(i,1);localStorage.setItem('b',JSON.stringify(b));load();}
load();

/* MODAL SYSTEM */
function openModal(text){
document.getElementById('modalContent').innerText=text;
document.getElementById('modal').style.display='flex';
}
function closeModal(){
document.getElementById('modal').style.display='none';
}

/* DEBATE */
const debates=[
{a:"Space expansion ensures survival.",b:"Earth should be prioritized."},
{a:"AI helps humanity.",b:"AI risks control."}
];
function debate(){let d=debates[Math.floor(Math.random()*debates.length)];openModal("SIDE A:\n"+d.a+"\n\nSIDE B:\n"+d.b);}

/* MUSIC */
const songs = [ { name:"Track 1", url:"https://www.youtube.com/embed/PqiRz28ym4M" }, { name:"Track 2", url:"https://www.youtube.com/embed/6zN98dHSFgQ" }, { name:"Track 3", url:"https://www.youtube.com/embed/KZGWfHdfWQs" }, { name:"Track 4", url:"https://www.youtube.com/embed/lYoWuaw5nSk" }, { name:"Track 5", url:"https://www.youtube.com/embed/MIcIza4sqaM" }, { name:"Track 6", url:"https://www.youtube.com/embed/V9PVRfjEBTI" }, { name:"Track 7", url:"https://www.youtube.com/embed/l08Zw-RY__Q" }, { name:"Track 8", url:"https://www.youtube.com/embed/71wMqeEUZtQ" }, { name:"Track 9", url:"https://www.youtube.com/embed/r52Skqzbe2A" } ];
let songIndex=0;
function loadSongs(){let s=document.getElementById("musicSelect");songs.forEach((x,i)=>{let o=document.createElement("option");o.value=i;o.innerText=x.name;s.appendChild(o);});}
loadSongs();
function playSong(){document.getElementById("player").innerHTML=`<iframe width=\"100%\" height=\"300\" src=\"${songs[songIndex].url}\"></iframe>`;}
function nextSong(){songIndex++;if(songIndex>=songs.length)songIndex=0;document.getElementById("musicSelect").value=songIndex;playSong();}

/* MESSAGES */
function addMsg(){
let t=document.getElementById('msgTitle').value;
let b=document.getElementById('msgBody').value;
if(!t||!b)return;
let msgs=JSON.parse(localStorage.getItem('msgs')||'[]');
msgs.push({t,b});
localStorage.setItem('msgs',JSON.stringify(msgs));
renderMsgs();
}

function renderMsgs(){
let msgs=JSON.parse(localStorage.getItem('msgs')||'[]');
let c=document.getElementById('msgs');
c.innerHTML='';
msgs.forEach((m,i)=>{
let d=document.createElement('div');
d.className='card';
d.innerHTML=`<b>${m.t}</b><br><button onclick=\"openMsg(${i})\">open</button><button onclick=\"delMsg(${i})\">X</button>`;
c.prepend(d);
});
}

function openMsg(i){
let msgs=JSON.parse(localStorage.getItem('msgs')||'[]');
openModal(msgs[i].b);
}

function delMsg(i){
let msgs=JSON.parse(localStorage.getItem('msgs')||'[]');
msgs.splice(i,1);
localStorage.setItem('msgs',JSON.stringify(msgs));
renderMsgs();
}

renderMsgs();

</script>
</body>
</html>
